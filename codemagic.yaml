workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - /Applications/Unity/Hub/Editor/2019.4.1f1
    environment:
      vars:
        UNITY_VERSION: 2019.4.1f1
        UNITY_VERSION_CHANGESET: e6c045e14e4e
        UNITY_IOS_BUILD_EXPORT_PATH: ios-build
        XCODE_PROJECT: "ios-build/Unity-iPhone.xcodeproj"
        XCODE_SCHEME: "Unity-iPhone"
        BUNDLE_ID: "com.jarbairn.dnasurfer"
        APPLE_TEAM_ID: "F9ZJ5TC7YW"
      ios_signing:
        provisioning_profiles:
          - jarbairn
        certificates:
          - Codemagic
    scripts:
      - name: Install Unity 2019.4.1f1 via Hub (cached)
        script: |
          if [ ! -d "/Applications/Unity/Hub/Editor/$UNITY_VERSION" ]; then
            echo "Unity not cached, installing..."
            /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
              --version $UNITY_VERSION \
              --changeset $UNITY_VERSION_CHANGESET \
              --module ios \
              --architecture x86_64
          else
            echo "Unity $UNITY_VERSION found in cache, skipping install."
          fi
          echo "UNITY_HOME=/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app" >> $CM_ENV

      - name: Activate Unity license
        script: |
          echo "$UNITY_LICENSE" | tr -d '\r' > /tmp/Unity_lic.ulf
          "$UNITY_HOME/Contents/MacOS/Unity" \
            -batchmode \
            -quit \
            -logFile /dev/stdout \
            -manualLicenseFile /tmp/Unity_lic.ulf || true

      - name: Set bundle ID
        script: |
          sed -i '' "s/com\.Company\.ProductName/$BUNDLE_ID/g" \
            ProjectSettings/ProjectSettings.asset || true

      - name: Build Unity iOS project
        script: |
          "$UNITY_HOME/Contents/MacOS/Unity" \
            -batchmode \
            -quit \
            -logFile /dev/stdout \
            -projectPath "$CM_BUILD_DIR" \
            -executeMethod BuildScript.BuildIos \
            -buildTarget iOS

      - name: Build Xcode project
        script: |
          xcode-project use-profiles
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/Unity-iPhone.xcarchive \
            archive \
            CODE_SIGN_STYLE=MANUAL \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jeremywhouse@gmail.com
        notify:
          success: true
          failure: true
