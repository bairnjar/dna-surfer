name: iOS Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build for iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Unity installation
        uses: actions/cache@v4
        with:
          path: /Applications/Unity/Hub/Editor
          key: unity-6000.0.47f1

      - name: Install Unity
        run: |
          # Download and install Unity Hub
          brew install --cask unity-hub || true
          # Install Unity 6
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
            --version 6000.0.47f1 \
            --module ios || true
          # Auto-detect Unity binary path
          UNITY_BIN=$(find /Applications/Unity/Hub/Editor -name "Unity" -type f | head -1)
          echo "Found Unity at: $UNITY_BIN"
          echo "UNITY_BIN=$UNITY_BIN" >> $GITHUB_ENV

      - name: Activate Unity (Personal License)
        run: |
          echo "${{ secrets.UNITY_LICENSE }}" > /tmp/Unity_lic.ulf
          "$UNITY_BIN" -batchmode -quit -logFile - -manualLicenseFile /tmp/Unity_lic.ulf || true

      - name: Build Unity iOS project
        run: |
          "$UNITY_BIN" \
            -batchmode \
            -quit \
            -logFile - \
            -projectPath "$GITHUB_WORKSPACE" \
            -executeMethod BuildScript.BuildIos \
            -buildTarget iOS

      - name: Install certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build Xcode project
        run: |
          xcodebuild \
            -project ios-build/Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Unity-iPhone.xcarchive \
            archive \
            CODE_SIGN_STYLE=AUTOMATIC \
            DEVELOPMENT_TEAM=F9ZJ5TC7YW

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>F9ZJ5TC7YW</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Unity-iPhone.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNA-Surfer-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
