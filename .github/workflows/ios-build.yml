name: iOS Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build for iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-iOS-

      - name: Build Unity iOS project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: iOS
          unityVersion: 6000.0.47f1

      - name: Install certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Installed profile UUID: $PP_UUID"

      - name: Fix Xcode project signing
        run: |
          XCODE_PROJECT=$(find . -name "Unity-iPhone.xcodeproj" | head -1)
          echo "Patching: $XCODE_PROJECT"
          # Set UnityFramework to automatic signing (it doesn't support provisioning profiles)
          # Set Unity-iPhone to manual signing with our distribution profile
          ruby -e '
            require "xcodeproj"
            project = Xcodeproj::Project.open("'"$XCODE_PROJECT"'")
            project.targets.each do |target|
              target.build_configurations.each do |config|
                if target.name == "Unity-iPhone"
                  config.build_settings["CODE_SIGN_STYLE"] = "Manual"
                  config.build_settings["DEVELOPMENT_TEAM"] = "F9ZJ5TC7YW"
                  config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ENV["PP_UUID"]
                  config.build_settings["CODE_SIGN_IDENTITY"] = "Apple Distribution"
                elsif target.name == "UnityFramework"
                  config.build_settings["CODE_SIGN_STYLE"] = "Automatic"
                  config.build_settings["DEVELOPMENT_TEAM"] = "F9ZJ5TC7YW"
                  config.build_settings.delete("PROVISIONING_PROFILE_SPECIFIER")
                end
              end
            end
            project.save
          '

      - name: Build Xcode archive
        run: |
          XCODE_PROJECT=$(find . -name "Unity-iPhone.xcodeproj" | head -1)
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Unity-iPhone.xcarchive \
            archive \
            PRODUCT_BUNDLE_IDENTIFIER=com.jarbairn.dnasurfer

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>F9ZJ5TC7YW</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jarbairn.dnasurfer</key>
              <string>bairnjar</string>
            </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Unity-iPhone.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DNA-Surfer-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
